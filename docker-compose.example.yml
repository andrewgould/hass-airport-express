# Example deployment for the QNAP + Docker Compose stack.
#
# ⚠️  mDNS / multicast + Docker networking
# ----------------------------------------
# mDNS multicast does NOT traverse Docker's default bridge cleanly, so discovery
# will silently see nothing. This uses host networking (Option A below), the
# same approach already proven working for Mosquitto on this QNAP.
#
# Option A — host networking (recommended; container shares the host's LAN
#   stack, exactly like the existing mosquitto container): simplest, and
#   already known to work in this environment. Host mode ignores `ports:`.
#
# Option B — macvlan (gives the container its own LAN IP instead): only worth
#   the extra complexity if host networking causes a port/IP conflict. Reuse
#   an existing macvlan network rather than creating a new one, and watch for
#   the DHCP/macvlan gotchas already hit in this environment.

services:
  airport-express-monitor:
    build: .
    container_name: airport-express-monitor
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - ./config.yaml:/app/config.yaml:ro

# --- Option B: macvlan, if host networking doesn't work out ------------------
# networks:
#   iot_macvlan:
#     external: true
#     name: iot_macvlan
# Then under the service above, replace `network_mode: host` with:
#   networks:
#     iot_macvlan:
#       ipv4_address: 192.168.1.60      # a free address in the macvlan range
